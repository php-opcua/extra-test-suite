name: 'Extra OPC UA Test Suite'
'description': 'Starts OPC UA test servers against open62541, not provided by uanetstandard-test-suitt.'

branding:
  icon: 'server'
  color: 'blue'

inputs:
  image-tag:
    description: 'Image tag to pull for every service in docker-compose.yml (e.g. v1.0.0, latest). All services share the same tag — the repo is versioned as a whole.'
    required: false
    default: 'latest'
  startup-timeout:
    description: 'Seconds to wait for each service TCP port to accept connections.'
    required: false
    default: '30'

runs:
  using: composite
  steps:
    - name: Pull + start test suite
      shell: bash
      env:
        TAG: ${{ inputs.image-tag }}
        COMPOSE_FILE: ${{ github.action_path }}/docker-compose.yml
        COMPOSE_CI_FILE: ${{ github.action_path }}/docker-compose.ci.yml
      run: |
        docker compose -f "$COMPOSE_FILE" -f "$COMPOSE_CI_FILE" pull
        docker compose -f "$COMPOSE_FILE" -f "$COMPOSE_CI_FILE" up -d

        wait_port() {
          name=$1
          port=$2
          for i in $(seq 1 ${{ inputs.startup-timeout }}); do
            if nc -z localhost "$port"; then
              echo "$name up after ${i}s on opc.tcp://localhost:$port"
              return 0
            fi
            sleep 1
          done
          echo "$name did not start within ${{ inputs.startup-timeout }}s on :$port" >&2
          return 1
        }

        rc=0
        wait_port open62541-nm 24840 || rc=1
        wait_port open62541-all-security 24841 || rc=1

        if [ "$rc" -ne 0 ]; then
          docker compose -f "$COMPOSE_FILE" -f "$COMPOSE_CI_FILE" logs || true
          exit "$rc"
        fi
