name: Publish Docker images

# Trigger: tag push `v*` builds every `services:` in docker-compose.yml and
# pushes to ghcr.io/<owner>/extra-test-suite/<service>:<tag> + :latest.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build all services (tagged and latest)
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Build every service in docker-compose.yml under the release tag.
          docker compose build --push

          # Re-tag each :${TAG} as :latest and push. Cheap — no re-build.
          for svc in $(docker compose config --services); do
            src="ghcr.io/${{ github.repository }}/${svc}:${TAG}"
            dst="ghcr.io/${{ github.repository }}/${svc}:latest"
            docker tag "$src" "$dst"
            docker push "$dst"
          done
